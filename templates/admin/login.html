<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login – Eye Disease Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="admin-login-body">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="text-center mb-4">
        <div class="brand-icon brand-icon-lg mx-auto mb-3"><i class="bi bi-eye-fill"></i></div>
        <h4 class="fw-bold">Eye Disease Detection</h4>
        <p class="text-muted small">Admin Control Panel</p>
      </div>

      {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
        <i class="bi bi-exclamation-circle-fill"></i>{{ error }}
      </div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-medium">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required id="pwInput">
            <button type="button" class="btn btn-outline-secondary" id="togglePw">
              <i class="bi bi-eye" id="pwIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-shield-lock me-2"></i>Sign In
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="text-muted text-decoration-none small">
          <i class="bi bi-arrow-left me-1"></i>Back to Homepage
        </a>
      </div>

      <div class="admin-login-note mt-4">
        <i class="bi bi-info-circle me-1"></i>
        Default credentials: <code>admin</code> / <code>admin123</code>
        <br>Change after first login in Settings.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePw').addEventListener('click', () => {
      const inp  = document.getElementById('pwInput');
      const icon = document.getElementById('pwIcon');
      if (inp.type === 'password') { inp.type='text'; icon.className='bi bi-eye-slash'; }
      else { inp.type='password'; icon.className='bi bi-eye'; }
    });
  </script>
</body>
</html>
